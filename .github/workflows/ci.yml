name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt -r requirements-dev.txt
    
    - name: Lint (flake8 fatal + ruff)
      run: |
        cd backend
        pip install flake8
        flake8 app --count --select=E9,F63,F7,F82,F821,E722 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        python -m ruff check app
    
    - name: Run backend tests
      run: |
        cd backend
        pytest tests -v
    
    - name: Verify imports
      run: |
        cd backend
        python -c "import app.main; print('Import successful')"

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Lint frontend
      run: |
        cd frontend
        npm run lint
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build
    
    - name: Frontend unit tests
      run: |
        cd frontend
        npm run test

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend Docker image
      run: |
        cd backend
        docker build -t resume-forge-backend:test .
    
    - name: Build frontend Docker image
      run: |
        cd frontend
        docker build -t resume-forge-frontend:test .
